<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#080b12">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Chat with Chrix Tech — Christian Agyapong's personal AI. Ask about his background, projects, and goals in Computer Science & AI/ML.">

    <title>Chrix Tech | Personal AI</title>



    <!-- Modern Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Background decorative blobs -->
        <div class="blob blob-1" aria-hidden="true"></div>
        <div class="blob blob-2" aria-hidden="true"></div>
        <div class="blob blob-3" aria-hidden="true"></div>

        <div class="chat-wrapper" role="main">
            <!-- Header -->
            <header class="chat-header">
                <div class="profile-info">
                    <div class="avatar-container">
                        <img src="{{ url_for('static', filename='avatar.jpg') }}"
                             alt="Chrix Tech — Christian Agyapong"
                             class="avatar">
                        <div class="status-indicator" title="Online" aria-label="Online"></div>
                    </div>
                    <div class="user-details">
                        <h1 class="user-name">Chrix Tech</h1>
                        <p class="user-title">Computer Science &amp; AI/ML Specialist</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="clear-btn" class="icon-button" title="Clear chat" aria-label="Clear chat">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M3 6h18"/>
                            <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
                            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Messages -->
            <div class="chat-messages" id="chat-messages" role="log" aria-live="polite" aria-label="Chat messages">
                <div class="message ai-message">
                    <div class="message-content">Hey! I’m Chrix Tech. What would you like to ask—projects, skills, or availability?</div>
                    <span class="message-time" aria-hidden="true">Just now</span>
                </div>
            </div>

            <!-- Input area -->
            <div class="chat-input-area">
                <div class="suggestions" id="suggestions" role="list" aria-label="Suggested questions">
                    <button class="suggestion-chip" role="listitem">What are your skills?</button>
                    <button class="suggestion-chip" role="listitem">Tell me about your AI experience</button>
                    <button class="suggestion-chip" role="listitem">What are your goals?</button>
                </div>

                <form id="chat-form" class="input-form" autocomplete="off" role="search" aria-label="Send a message">
                    <div class="glass-input">
                        <input
                            type="text"
                            id="message-input"
                            placeholder="Ask Chrix anything…"
                            autocomplete="off"
                            autocorrect="off"
                            spellcheck="true"
                            aria-label="Your message"
                            enterkeyhint="send"
                        >
                        <button type="submit" id="send-btn" class="send-button" disabled aria-label="Send message">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2.2"
                                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <line x1="22" y1="2" x2="11" y2="13"/>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                        </button>
                        <button type="button" id="stop-btn" class="stop-button hidden" aria-label="Stop generating">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                 fill="currentColor" stroke="none" aria-hidden="true">
                                <rect x="6" y="6" width="12" height="12" rx="1"></rect>
                            </svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
